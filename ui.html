<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<style>
		* {
			box-sizing: border-box;
			scrollbar-width: thin;
			scrollbar-color: #5a5f6b transparent;
		}

		body {
			margin: 0;
			height: 100vh;
			background: #1e1e22;
			color: #ddd;
			font-family: Segoe UI;
			overflow: hidden;
		}

		#app {
			width: 100vw;
			height: 100vh;
		}

		#sidebar {
			position: relative;
			min-width: 0;
			height: 100vh;
			display: flex;
			flex-direction: column;
			background: #18181c;
			border-right: 1px solid #34363b;
		}

		#resizeHandle {
			position: absolute;
			top: 0;
			right: 0;
			width: 2px;
			height: 100%;
			cursor: ew-resize;
			z-index: 10;
		}

		#resizeHandle:hover,
		body.resizing #resizeHandle {
			background: #39525a;
		}

		#toolbarRow {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 10px 14px 10px 8px;
			flex: 0 0 auto;
		}

		#search {
			min-width: 0;
			flex: 1;
			height: 34px;
			margin: 0;
			padding: 0 10px;
			border: none;
			outline: none;
			border-radius: 6px;
			background: #2a2a30;
			color: #ddd;
		}

		#tree {
			flex: 1;
			min-height: 0;
			overflow-y: auto;
			padding: 8px;
		}

		#error {
			display: none;
			margin: 0 10px 10px;
			padding: 8px 10px;
			border-radius: 6px;
			background: #5a2027;
			color: #ffd9de;
			font-size: 12px;
			overflow-wrap: anywhere;
		}

		.item {
			margin: 2px 0;
		}

		.row {
			min-height: 32px;
			padding: 7px 10px;
			border-radius: 6px;
			cursor: pointer;
			display: flex;
			gap: 8px;
			align-items: flex-start;
			color: #ccc;
		}

		.row:hover {
			background: #2b2b31;
		}

		.item.active>.row {
			background: #3a3a45;
			color: #fff;
		}

		.arrow {
			width: 12px;
			padding-top: 7px;
			display: inline-block;
			text-align: center;
			font-family: Arial;
			font-size: 9px;
		}

		.title {
			min-width: 0;
			overflow-wrap: anywhere;
		}

		.children {
			display: none;
			margin-left: 18px;
			padding-left: 8px;
			border-left: 1px solid #333;
		}

		.item.open>.children {
			display: block;
		}

		#btnBack,
		#btnForward {
			width: 34px;
			height: 34px;
			flex: 0 0 34px;
			border: none;
			border-radius: 6px;
			background: #2a2a30;
			color: #ddd;
			cursor: pointer;
		}

		#btnBack:hover,
		#btnForward:hover {
			background: #343a45;
		}

		#btnToggleSidebar {
			position: absolute;
			top: 50%;
			right: 5px;
			transform: translateY(-50%);
			width: 28px;
			height: 56px;
			border: 1px solid #3d4148;
			border-right-color: #4a5058;
			border-radius: 8px;
			background: #24272d;
			color: #d7dbe2;
			cursor: pointer;
			z-index: 20;
			box-shadow: 0 8px 18px rgba(0, 0, 0, .24);
		}

		#btnToggleSidebar:hover {
			background: #303640;
			border-color: #59616c;
		}

		body.collapsed #search,
		body.collapsed #btnBack,
		body.collapsed #btnForward,
		body.collapsed #toolbarRow,
		body.collapsed #tree,
		body.collapsed #error,
		body.collapsed #resizeHandle {
			display: none;
		}

		body.collapsed #btnToggleSidebar {
			right: 8px;
			width: 28px;
			height: 64px;
		}

		::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		::-webkit-scrollbar-track {
			background: transparent;
		}

		::-webkit-scrollbar-thumb {
			background: #505564;
			border-radius: 999px;
			border: 2px solid transparent;
			background-clip: padding-box;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #6a7080;
			border: 2px solid transparent;
			background-clip: padding-box;
		}
	</style>
</head>

<body>
	<div id="app">
		<div id="sidebar">
			<button id="btnToggleSidebar" onclick="toggleSidebar()" title="Toggle sidebar">&lt;</button>
			<div id="toolbarRow">
				<button id="btnBack" onclick="goBack()">&lt;</button>
				<input id="search" placeholder="Search...">
				<button id="btnForward" onclick="goForward()">&gt;</button>
			</div>
			<div id="tree"></div>
			<div id="error"></div>
			<div id="resizeHandle"></div>
		</div>
	</div>

	<script>
		const tree = document.getElementById("tree");
		const errorBox = document.getElementById("error");
		const resizeHandle = document.getElementById("resizeHandle");
		const btnToggleSidebar = document.getElementById("btnToggleSidebar");
		let allElements = [];
		let resizing = false;
		let collapsed = false;

		function initTree(data, firstPath) {
			renderTree(data);
			expandRoot();
			restoreScroll();
			const last = localStorage.getItem("lastFile");
			const target = last || firstPath;
			const sidebarWidth = parseInt(localStorage.getItem("sidebarWidth") || "", 10);
			collapsed = localStorage.getItem("sidebarCollapsed") === "true";
			if (collapsed) {
				setSidebarCollapsed(true);
			} else if (sidebarWidth) {
				resizeSidebar(sidebarWidth);
			}
			if (target) {
				const node = findNodeByPath(target);
				if (node) setActive(node);
				openFile(target);
			}
		}

		function renderTree(data) {
			tree.innerHTML = "";
			allElements = [];
			data.forEach(n => tree.appendChild(createNode(n)));
		}

		function createNode(node) {
			const item = document.createElement("div");
			item.className = "item";
			item.dataset.name = node.name.toLowerCase();
			item.dataset.path = node.path || "";
			allElements.push(item);

			const row = document.createElement("div");
			row.className = "row";

			const arrow = document.createElement("span");
			arrow.className = "arrow";
			arrow.textContent = (node.children && node.children.length) ? ">" : "";

			const title = document.createElement("span");
			title.className = "title";
			title.textContent = node.name.replace(/^\d+(\.\d+)*\.?\s*/, "");

			row.appendChild(arrow);
			row.appendChild(title);
			item.appendChild(row);

			if (node.children && node.children.length) {
				const children = document.createElement("div");
				children.className = "children";
				node.children.forEach(c => children.appendChild(createNode(c)));
				item.appendChild(children);
				row.onclick = () => {
					item.classList.toggle("open");
					arrow.textContent = item.classList.contains("open") ? "v" : ">";
					if (node.path) {
						setActive(item);
						openFile(node.path);
					}
				};
			} else {
				row.onclick = () => {
					setActive(item);
					openFile(node.path);
				};
			}
			return item;
		}

		function goBack() {
			sendMessage({ type: "back" });
		}

		function goForward() {
			sendMessage({ type: "forward" });
		}

		function openFile(path) {
			localStorage.setItem("lastFile", path);
			hideError();
			sendMessage({ type: "open", path: path });
		}

		function sendMessage(obj) {
			if (window.chrome && chrome.webview) {
				chrome.webview.postMessage(obj);
			}
		}

		function showError(message) {
			errorBox.textContent = message;
			errorBox.style.display = "block";
		}

		function hideError() {
			errorBox.textContent = "";
			errorBox.style.display = "none";
		}

		function resizeSidebar(width) {
			const nextWidth = Math.max(220, Math.min(720, Math.round(width)));
			localStorage.setItem("sidebarWidth", nextWidth.toString());
			localStorage.setItem("sidebarCollapsed", "false");
			collapsed = false;
			document.body.classList.remove("collapsed");
			btnToggleSidebar.textContent = "<";
			sendMessage({ type: "resizeSidebar", width: nextWidth });
		}

		function toggleSidebar() {
			setSidebarCollapsed(!collapsed);
		}

		function setSidebarCollapsed(nextCollapsed) {
			collapsed = nextCollapsed;
			localStorage.setItem("sidebarCollapsed", collapsed ? "true" : "false");
			document.body.classList.toggle("collapsed", collapsed);
			btnToggleSidebar.textContent = collapsed ? ">" : "<";
			const width = parseInt(localStorage.getItem("sidebarWidth") || "340", 10);
			sendMessage({
				type: "collapseSidebar",
				collapsed: collapsed,
				width: Math.max(220, Math.min(720, width))
			});
		}

		resizeHandle.addEventListener("pointerdown", e => {
			if (collapsed) return;
			resizing = true;
			document.body.classList.add("resizing");
			resizeHandle.setPointerCapture(e.pointerId);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointermove", e => {
			if (!resizing || collapsed) return;
			resizeSidebar(e.clientX);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointerup", e => {
			resizing = false;
			document.body.classList.remove("resizing");
			resizeHandle.releasePointerCapture(e.pointerId);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointercancel", () => {
			resizing = false;
			document.body.classList.remove("resizing");
		});

		function setActive(el) {
			document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
			el.classList.add("active");
			expandParents(el);
			el.scrollIntoView({ block: "nearest" });
		}

		function findNodeByPath(path) {
			const lower = path.toLowerCase();
			for (const node of document.querySelectorAll(".item")) {
				const p = node.dataset.path;
				if (p && p.toLowerCase() === lower) return node;
			}
			return null;
		}

		function expandRoot() {
			document.querySelectorAll("#tree > .item").forEach(item => {
				item.classList.add("open");
				const arrow = item.querySelector(".arrow");
				if (arrow && item.querySelector(":scope > .children")) arrow.textContent = "v";
			});
		}

		document.getElementById("search").addEventListener("input", e => {
			const q = e.target.value.trim().toLowerCase();
			if (!q) {
				allElements.forEach(el => {
					el.style.display = "";
					el.classList.remove("open");
					const a = el.querySelector(":scope > .row .arrow");
					if (a && el.querySelector(":scope > .children")) a.textContent = ">";
				});
				expandRoot();
				const active = document.querySelector(".item.active");
				if (active) {
					expandParents(active);
					active.scrollIntoView({ block: "nearest" });
				}
				return;
			}

			allElements.forEach(el => el.style.display = "none");
			allElements.forEach(el => {
				if (el.dataset.name.includes(q)) {
					el.style.display = "";
					let p = el.parentElement;
					while (p) {
						if (p.classList && p.classList.contains("item")) {
							p.style.display = "";
							p.classList.add("open");
							const a = p.querySelector(":scope > .row .arrow");
							if (a) a.textContent = "v";
						}
						p = p.parentElement;
					}
				}
			});
		});

		tree.addEventListener("scroll", () => {
			localStorage.setItem("scrollY", tree.scrollTop);
		});

		function restoreScroll() {
			const y = localStorage.getItem("scrollY");
			if (y) tree.scrollTop = parseInt(y);
		}

		function setActiveByPath(path) {
			const node = findNodeByPath(path);
			if (node) setActive(node);
		}

		function openNode(item) {
			item.classList.add("open");
			const a = item.querySelector(":scope > .row .arrow");
			if (a && item.querySelector(":scope > .children")) a.textContent = "v";
		}

		function expandParents(node) {
			let p = node.parentElement;
			while (p) {
				const item = p.closest(".item");
				if (item) openNode(item);
				p = item ? item.parentElement : null;
			}
		}
	</script>
</body>

</html>
