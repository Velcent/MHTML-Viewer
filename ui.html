<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<style>
		body {
			margin: 0;
			height: 100vh;
			background: #1e1e22;
			font-family: Segoe UI;
			overflow: hidden;
		}

		#sidebar {
			height: 100%;
			display: flex;
			flex-direction: column;
			background: #18181c;
		}

		#search {
			flex: 1;
			margin: 0;
			padding: 10px;
			border: none;
			outline: none;
			border-radius: 8px;
			background: #2a2a30;
			color: #ddd;
		}

		#tree {
			flex: 1;
			overflow-y: auto;
			padding: 8px;
		}

		.item {
			margin: 2px 0;
		}

		.row {
			padding: 7px 10px;
			border-radius: 8px;
			cursor: pointer;
			display: flex;
			gap: 8px;
			color: #ccc;
		}

		.row:hover {
			background: #2b2b31;
		}

		.item.active>.row {
			background: #3a3a45;
			color: #fff;
		}

		.arrow {
			width: 12px;
			padding-top: 7px;
			display: inline-block;
			text-align: center;
			font-family: Arial;
			font-size: 9px;
		}

		.children {
			display: none;
			margin-left: 18px;
			padding-left: 8px;
			border-left: 1px solid #333;
		}

		.item.open>.children {
			display: block;
		}

		/* Firefox */
		* {
			scrollbar-width: thin;
			scrollbar-color: #5a5f6b transparent;
		}

		/* Chromium / WebView2 */
		::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		::-webkit-scrollbar-track {
			background: transparent;
		}

		::-webkit-scrollbar-thumb {
			background: #505564;
			border-radius: 999px;
			border: 2px solid transparent;
			background-clip: padding-box;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #6a7080;
			border: 2px solid transparent;
			background-clip: padding-box;
		}

		::-webkit-scrollbar-corner {
			background: transparent;
		}

		#toolbarRow {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 10px;
		}

		#btnBack,
		#btnForward {
			width: 34px;
			height: 34px;
			flex: 0 0 34px;
			border: none;
			border-radius: 8px;
			background: #2a2a30;
			color: #ddd;
			cursor: pointer;
		}

		#btnBack:hover,
		#btnForward:hover {
			background: #343a45;
		}

		#btnBack:disabled,
		#btnForward:disabled {
			opacity: .4;
			cursor: default;
		}
	</style>
</head>

<body>
	<div id="sidebar">
		<div id="toolbarRow">
			<button id="btnBack" onclick="goBack()">←</button>
			<input id="search" placeholder="Search...">
			<button id="btnForward" onclick="goForward()">→</button>
		</div>
		<div id="tree"></div>
	</div>
	<script>
		let allElements = [];

		function initTree(data) {
			renderTree(data);
			expandRoot();
			restoreScroll();
			restoreLast();
		}

		function renderTree(data) {
			let root = document.getElementById("tree");
			root.innerHTML = "";
			allElements = [];
			data.forEach(n => {
				root.appendChild(createNode(n));
			});
		}

		function createNode(node) {
			let item = document.createElement("div");
			item.className = "item";
			item.dataset.name = node.name.toLowerCase();
			item.dataset.path = node.path || "";
			allElements.push(item);
			let row = document.createElement("div");
			row.className = "row";
			let arrow = document.createElement("span");
			arrow.className = "arrow";
			arrow.textContent = (node.children && node.children.length) ? "► " : "";
			let title = document.createElement("span");
			title.textContent = node.name.replace(/^\d+(\.\d+)*\.?\s*/, "");
			row.appendChild(arrow);
			row.appendChild(title);
			item.appendChild(row);

			if (node.children && node.children.length) {
				let children = document.createElement("div");
				children.className = "children";
				node.children.forEach(c => {
					children.appendChild(
						createNode(c)
					);
				});
				item.appendChild(children);
				row.onclick = () => {
					item.classList.toggle("open");
					arrow.textContent = item.classList.contains("open") ? "▼ " : "► ";
					if (node.path) {
						setActive(item);
						openFile(node.path);
					}
				};
			} else {
				row.onclick = () => {
					setActive(item);
					openFile(node.path);
				};
			}
			return item;
		}

		function goBack() {
			sendMessage({ type: "back" });
		}

		function goForward() {
			sendMessage({ type: "forward" });
		}

		function openFile(path) {
			localStorage.setItem("lastFile", path);
			sendMessage({
				type: "open",
				path: path
			});
		}

		function sendMessage(obj) {
			if (window.chrome && chrome.webview) {
				chrome.webview.postMessage(obj);
			}
		}

		function setActive(el) {
			document
				.querySelectorAll(".item")
				.forEach(
					i => i.classList.remove(
						"active"
					));

			el.classList.add("active");
		}


		function restoreLast() {
			let last = localStorage.getItem("lastFile");
			if (!last) return;
			document
				.querySelectorAll(".item")
				.forEach(el => {

					if (el.dataset.path === last)
						setActive(el);
				});
		}

		function expandRoot() {
			document
				.querySelectorAll("#tree > .item")
				.forEach(item => {
					item.classList.add("open");
					let arrow = item.querySelector(".arrow");
					if (arrow) arrow.textContent = "▼ ";
				});
		}

		document
			.getElementById("search")
			.addEventListener("input", e => {
				let q = e.target.value.trim().toLowerCase();

				/* reset jika kosong */
				if (!q) {
					allElements.forEach(el => {
						el.style.display = "";
						el.classList.remove("open");
						let a = el.querySelector(":scope > .row .arrow");
						if (a && el.querySelector(":scope > .children"))
							a.textContent = "► ";
					});
					/* root tetap expand */
					expandRoot();
					/* re-expand jalur item aktif */
					let active = document.querySelector(".item.active");
					if (active) {
						expandParents(active);
						active.scrollIntoView({ block: "nearest" });
					}
					return;
				}

				/* hide dulu semua */
				allElements.forEach(el => {
					el.style.display = "none";
				});

				/* tampilkan match + parent */
				allElements.forEach(el => {

					if (el.dataset.name.includes(q)) {
						el.style.display = "";
						let p = el.parentElement;
						while (p) {
							if (p.classList && p.classList.contains("item")) {
								p.style.display = "";
								p.classList.add("open");
								let a = p.querySelector(":scope > .row .arrow");
								if (a) a.textContent = "▼ ";
							}
							p = p.parentElement;
						}
					}
				});
			}
			);

		const tree = document.getElementById("tree");
		tree.addEventListener("scroll", () => {
			localStorage.setItem("scrollY", tree.scrollTop);
		});

		function restoreScroll() {
			let y = localStorage.getItem("scrollY");
			if (y) tree.scrollTop = parseInt(y);
		}

		function setActiveByPath(path) {
			console.log(path);
			let nodes = document.querySelectorAll(".item");
			for (let n of nodes) n.classList.remove("active");
			for (let n of nodes) {
				let p = n.dataset.path;
				if (!p) continue;
				if (p.toLowerCase() === path.toLowerCase()) {
					n.classList.add("active");
					expandParents(n);
					n.scrollIntoView({ block: "nearest" });
					break;
				}
			}
		}

		function openNode(item) {
			item.classList.add("open");
			let a = item.querySelector(":scope > .row .arrow");
			if (a) a.textContent = "▼ ";
		}

		function expandParents(node) {
			let p = node.parentElement;
			while (p) {
				let item = p.closest(".item");
				if (item) openNode(item);
				p = item ? item.parentElement : null;
			}
		}
	</script>
</body>

</html>
