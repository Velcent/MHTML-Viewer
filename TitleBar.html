<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<style>
		body {
			margin: 0;
			padding: 0;
			border: 0;
			font-family: Segoe UI;
			background: #1e1e1e;
			color: white;
			user-select: none;
			overflow: hidden;
		}

		.bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			height: 35px;
			padding: 0;
		}

		.left {
			display: flex;
			align-items: center;
			gap: 8px;
			flex: 1;
			height: 100%;
		}

		.icon {
			width: 24px;
			height: 24px;
			margin: 0 10px;
		}

		.title {
			font-size: 13px;
			opacity: 0.9;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
			transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
		}

		.title.hidden {
			opacity: 0;
		}

		.controls {
			display: flex;
			gap: 0px;
			height: 100%;
		}

		.btn {
			width: 50px;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			border-radius: 4px;
		}

		.btn:hover {
			background: #333;
		}

		.close:hover {
			background: #e81123;
		}

		.loading {
			position: absolute;
			left: 50%;
			transform: translateX(-50%);

			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 12px;
			opacity: 0.9;
		}

		.loading.hidden {
			opacity: 0;
			pointer-events: none;
		}

		/* Spinner modern */
		.spinner {
			width: 14px;
			height: 14px;
			border: 2px solid rgba(255, 255, 255, 0.2);
			border-top: 2px solid white;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		/* Animasi muter */
		@keyframes spin {
			from {
				transform: rotate(0deg);
			}

			to {
				transform: rotate(360deg);
			}
		}

		.loading {
			transition: opacity 0.25s ease;
		}

		/* Teks */
		.loading-text {
			white-space: nowrap;
		}

		[data-link] {
			cursor: pointer;
			color: inherit;
			text-decoration: none;
			transition: background-color 0.2s ease;
			background-color: transparent;
			border-radius: 5px;
			padding: 4px 6px;
			display: inline-block;
		}

		[data-link]:hover {
			background-color: rgba(255, 255, 255, 0.1);
		}
	</style>
</head>

<body>

	<div class="bar">

		<div class="left" id="dragArea">
			<img class="icon" id="appIcon">
			<div class="title hidden" id="title">MHTML Viewer</div>
			<div class="loading hidden">
				<div class="spinner"></div>
				<span class="loading-text">Loading...</span>
			</div>
		</div>

		<div class="controls">
			<div class="btn" onclick="min()">—</div>
			<div class="btn" id="maxBtn" onclick="toggleMax()">⬜</div>
			<div class="btn close" onclick="closeApp()">✕</div>
		</div>

	</div>

	</div>

	<script>
		const host = chrome.webview;
		const titleEl = document.getElementById("title");
		let lastIsAnimate = true;
		let first = titleEl.getBoundingClientRect();
		let last = titleEl.getBoundingClientRect();
		let titleTimeout = null;
		let currentTitle;

		function min() {
			host.postMessage({ type: "minimize" });
		}

		function toggleMax() {
			host.postMessage({ type: "toggleMaximize" });
		}

		function closeApp() {
			host.postMessage({ type: "close" });
		}

		// === API dari C# ===

		function setTitle(title, isAnimate) {
			if (title === currentTitle) return;
			currentTitle = title;
			cancelTitle();
			if (isAnimate) {
				if (lastIsAnimate) {
					first = titleEl.getBoundingClientRect();
					animateTitle(title)
				} else {
					titleTimeout = setTimeout(() => {
						titleTimeout = null;
						animateTitle(title)
					}, 100);
				}
			} else {
				first = titleEl.getBoundingClientRect()
				titleEl.classList.add("hidden");
				titleTimeout = setTimeout(() => {
					titleEl.innerHTML = title;
					titleEl.classList.remove("hidden");
					titleTimeout = null;
				}, 100);
				lastIsAnimate = false;
			}
		}

		function animateTitle(title) {
			titleEl.style.transition = "opacity 0.25s ease";
			titleEl.innerHTML = title;
			last = titleEl.getBoundingClientRect();
			const dx = first.left - last.left;
			titleEl.style.transform = `translateX(calc(-50% + ${dx}px))`;
			requestAnimationFrame(() => {
				requestAnimationFrame(() => {
					titleEl.style.transition = "";
					titleEl.style.transform = "translateX(-50%)";
				});
			});
			lastIsAnimate = true;
		}

		function cancelTitle() {
			if (titleTimeout) {
				clearTimeout(titleTimeout);
				titleTimeout = null;
				titleEl.classList.remove("hidden");
			}
		}

		function setIcon(src) {
			document.getElementById("appIcon").src = src;
		}

		function setMaximized(isMax) {
			document.getElementById("maxBtn").innerText = isMax ? "❐" : "⬜";
		}

		function showLoading(t) {
			document.querySelector(".title").classList.add("hidden");
			document.querySelector(".loading").classList.remove("hidden");
			document.querySelector(".loading").style.display = "flex";
			document.querySelector(".loading-text").textContent = t;
		}

		function hideLoading() {
			document.querySelector(".loading").classList.add("hidden");
			setTimeout(() => {
				document.querySelector(".loading").style.display = "none";
				document.querySelector(".title").classList.remove("hidden");
			}, 300);
		}

		// === drag ===
		const drag = document.getElementById("dragArea");

		let lastClick = 0;
		drag.addEventListener("mousedown", e => {
			// handle link click
			const el = e.target.closest('[data-link]');
			if (el) {
				const url = el.getAttribute('href');
				if (url) host.postMessage({ type: "OpenLink", url: url });
				return;
			}
			// handle drag
			host.postMessage({ type: "drag" });
			// handle double click to toggle maximize
			const now = Date.now();
			if (now - lastClick < 300) {
				host.postMessage({ type: "toggleMaximize" });
			}
			lastClick = now;
		});
	</script>

</body>

</html>
