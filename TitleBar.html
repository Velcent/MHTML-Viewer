<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<style>
		body {
			margin: 0;
			padding: 0;
			border: 0;
			font-family: Segoe UI;
			background: #1e1e1e;
			color: white;
			user-select: none;
			overflow: hidden;
		}

		.bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			height: 35px;
			padding: 0;
		}

		.left {
			display: flex;
			align-items: center;
			gap: 8px;
			flex: 1;
			height: 100%;
		}

		.icon {
			width: 24px;
			height: 24px;
			margin: 0 10px;
		}

		.title {
			font-size: 13px;
			opacity: 0.9;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			position: absolute;
			left: 50%;
			transform: translateX(-50%);
		}

		.title.hidden {
			opacity: 0;
		}

		.controls {
			display: flex;
			gap: 0px;
			height: 100%;
		}

		.btn {
			width: 50px;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			border-radius: 4px;
		}

		.btn:hover {
			background: #333;
		}

		.close:hover {
			background: #e81123;
		}

		.loading {
			position: absolute;
			left: 50%;
			transform: translateX(-50%);

			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 12px;
			opacity: 0.9;
		}

		.loading.hidden {
			opacity: 0;
			pointer-events: none;
		}

		/* Spinner modern */
		.spinner {
			width: 14px;
			height: 14px;
			border: 2px solid rgba(255, 255, 255, 0.2);
			border-top: 2px solid white;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		/* Animasi muter */
		@keyframes spin {
			from {
				transform: rotate(0deg);
			}

			to {
				transform: rotate(360deg);
			}
		}

		.title,
		.loading {
			transition: opacity 0.25s ease;
		}

		/* Teks */
		.loading-text {
			white-space: nowrap;
		}
	</style>
</head>

<body>

	<div class="bar">

		<div class="left" id="dragArea">
			<img class="icon" id="appIcon">
			<div class="title hidden" id="title">MHTML Viewer</div>
			<div class="loading hidden">
				<div class="spinner"></div>
				<span class="loading-text">Loading...</span>
			</div>
		</div>

		<div class="controls">
			<div class="btn" onclick="min()">—</div>
			<div class="btn" id="maxBtn" onclick="toggleMax()">⬜</div>
			<div class="btn close" onclick="closeApp()">✕</div>
		</div>

	</div>

	</div>

	<script>
		const host = chrome.webview;

		function min() {
			host.postMessage("minimize");
		}

		function toggleMax() {
			host.postMessage("toggleMaximize");
		}

		function closeApp() {
			host.postMessage("close");
		}

		// === API dari C# ===

		function setTitle(t) {
			document.getElementById("title").innerText = t;
		}

		function setIcon(src) {
			document.getElementById("appIcon").src = src;
		}

		function setMaximized(isMax) {
			document.getElementById("maxBtn").innerText = isMax ? "❐" : "⬜";
		}

		function showLoading(t) {
			document.querySelector(".title").classList.add("hidden");
			document.querySelector(".loading").classList.remove("hidden");
			document.querySelector(".loading").style.display = "flex";
			document.querySelector(".loading-text").textContent = t;
		}

		function hideLoading() {
			document.querySelector(".loading").classList.add("hidden");
			setTimeout(() => {
				document.querySelector(".loading").style.display = "none";
				document.querySelector(".title").classList.remove("hidden");
			}, 300);
		}

		// === drag ===
		const drag = document.getElementById("dragArea");

		let lastClick = 0;
		drag.addEventListener("mousedown", () => {
			host.postMessage("drag");
			const now = Date.now();
			if (now - lastClick < 300) {
				host.postMessage("toggleMaximize");
			}
			lastClick = now;
		});

		// double click = maximize
		drag.addEventListener("dblclick", () => {
			host.postMessage("toggleMaximize");
		});
	</script>

</body>

</html>
