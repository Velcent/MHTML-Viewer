<!DOCTYPE html>
<!-- Sidebar WebView: renders the document tree, search, loading state, and history controls. -->
<html>

<head>
	<meta charset="utf-8">
	<style>
		* {
			box-sizing: border-box;
			scrollbar-width: thin;
			scrollbar-color: #5a5f6b transparent;
		}

		body {
			margin: 0;
			height: 100vh;
			background: #1e1e22;
			color: #ddd;
			font-family: Segoe UI;
			overflow: hidden;
		}

		#app {
			width: 100vw;
			height: 100vh;
		}

		#sidebar {
			position: relative;
			min-width: 0;
			height: 100vh;
			display: flex;
			flex-direction: column;
			background: #18181c;
			border-right: 1px solid #34363b;
			transition: width 0.15s ease;
		}

		#resizeHandle {
			position: absolute;
			top: 0;
			right: 0;
			width: 4px;
			height: 100%;
			cursor: ew-resize;
			z-index: 10;
		}

		body.collapsed #resizeHandle {
			display: none;
		}

		#resizeHandle:hover,
		body.resizing #resizeHandle {
			background: #39525a;
		}

		#toolbarRow {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 10px 14px 10px 8px;
			flex: 0 0 auto;
		}

		#search {
			min-width: 0;
			flex: 1;
			height: 34px;
			margin: 0;
			padding: 0 10px;
			border: none;
			outline: none;
			border-radius: 6px;
			background: #2a2a30;
			color: #ddd;
		}

		#tree {
			flex: 1;
			min-height: 0;
			overflow-y: auto;
			padding: 8px;
		}

		#error {
			display: none;
			margin: 0 10px 10px;
			padding: 8px 10px;
			border-radius: 6px;
			background: #5a2027;
			color: #ffd9de;
			font-size: 12px;
			overflow-wrap: anywhere;
		}

		.item {
			margin: 2px 0;
		}

		.row {
			min-height: 32px;
			padding: 7px 10px;
			border-radius: 6px;
			display: flex;
			gap: 8px;
			align-items: flex-start;
			color: #ccc;
		}

		.row:hover {
			background: #2b2b31;
		}

		.item.active>.row {
			background: #3a3a45;
			color: #fff;
		}

		.arrow {
			width: 12px;
			height: 18px;
			margin-top: 2px;
			padding: 0;
			flex: 0 0 12px;
			text-align: center;
			font-family: Arial;
			font-size: 9px;
			line-height: 18px;
			color: inherit;
			background: transparent;
			border: 0;
		}

		.arrow-button {
			cursor: pointer;
		}

		.arrow-button:hover {
			color: #fff;
		}

		.title {
			min-width: 0;
			width: 100%;
			overflow-wrap: anywhere;
			cursor: pointer;
		}

		.children {
			display: none;
			margin-left: 18px;
			padding-left: 8px;
			border-left: 1px solid #333;
		}

		.item.open>.children {
			display: block;
		}

		#btnBack,
		#btnForward {
			width: 34px;
			height: 34px;
			flex: 0 0 34px;
			border: none;
			border-radius: 6px;
			background: #2a2a30;
			color: #ddd;
			cursor: pointer;
		}

		#btnBack:hover,
		#btnForward:hover {
			background: #343a45;
		}

		::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		::-webkit-scrollbar-track {
			background: transparent;
		}

		::-webkit-scrollbar-thumb {
			background: #505564;
			border-radius: 999px;
			border: 2px solid transparent;
			background-clip: padding-box;
		}

		::-webkit-scrollbar-thumb:hover {
			background: #6a7080;
			border: 2px solid transparent;
			background-clip: padding-box;
		}

		#loadingOverlay {
			position: fixed;
			inset: 0;
			background: rgba(20, 20, 22, 0.45);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 9999;
			backdrop-filter: blur(2px);
		}

		#loadingOverlay.show {
			display: flex;
		}

		.spinner {
			width: 36px;
			height: 36px;
			border: 3px solid #444;
			border-top-color: #4cafef;
			border-radius: 50%;
			animation: spin 0.7s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<div id="loadingOverlay">
		<div class="spinner"></div>
	</div>
	<div id="app">
		<div id="sidebar">
			<div id="toolbarRow">
				<button id="btnBack" onclick="goBack()">⮜</button>
				<input id="search" placeholder="Search...">
				<button id="btnForward" onclick="goForward()">⮞</button>
			</div>
			<div id="tree"></div>
			<div id="error"></div>
			<div id="resizeHandle"></div>
		</div>
	</div>

	<script>
		// C# calls initTree/setActiveByPath and receives user actions through chrome.webview messages.
		const tree = document.getElementById("tree");
		const errorBox = document.getElementById("error");
		const sidebar = document.getElementById("sidebar");
		const resizeHandle = document.getElementById("resizeHandle");
		let allElements = [];
		let resizing = false;
		let collapsed = false;
		let sidebarWidth = 340;
		let resizeStartClientX = 0;
		let resizeStartWidth = sidebarWidth;
		let resizeCssToHostScale = 1;
		const minSidebarWidth = 220;
		const maxSidebarWidth = 720;
		const ARROW_CLOSED = "\u2b9e";
		const ARROW_OPEN = "\u2b9f";

		function initTree(data, firstPath, state) {
			// Render cached tree data, restore persisted state, then open the best initial document.
			sidebarWidth = clampSidebarWidth(Number(state.sidebarWidth) || sidebarWidth);
			renderTree(data);
			const lastPath = state.lastFile || "";
			const lastNode = lastPath ? findNodeByPath(lastPath) : null;
			const lastSwitchNode = lastNode || (lastPath ? findNodeBySwitchGroupPath(lastPath) : null);
			const target = lastPath || firstPath;
			const node = lastSwitchNode || (!lastPath && firstPath ? findNodeByPath(firstPath) : null);
			if (target) {
				if (node && !node.classList.contains('active')) setInitialActive(node);
				openFile(target);
			}
			setCollapsed(state.collapsed);			
		}

		function setCollapsed(isCollapsed) {
			collapsed = isCollapsed;
			if (collapsed) {
				document.body.classList.add("collapsed");
			} else {
				document.body.classList.remove("collapsed");
				document.querySelector(".item.active")?.scrollIntoView({ block: "nearest" });
			}
		}

		function renderTree(data) {
			tree.innerHTML = "";
			allElements = [];
			data.forEach(n => tree.appendChild(createNode(n)));
		}

		function createNode(node) {
			// Node JSON comes from DocumentTreeBuilder and keeps camelCase names for this script.
			const item = document.createElement("div");
			item.className = "item";
			item.dataset.name = node.name.toLowerCase();
			item.dataset.path = node.path || "";
			allElements.push(item);

			const row = document.createElement("div");
			row.className = "row";

			const hasChildren = node.children && node.children.length;
			const arrow = document.createElement(hasChildren ? "button" : "span");
			arrow.className = hasChildren ? "arrow arrow-button" : "arrow arrow-placeholder";
			arrow.textContent = hasChildren ? ARROW_CLOSED : "";
			if (hasChildren) {
				arrow.type = "button";
				arrow.title = "Expand/collapse";
			}

			const title = document.createElement("span");
			title.className = "title";
			title.textContent = node.keepNumbering ? node.name : node.name.replace(/^\d+(\.\d+)*\.?\s*/, "");
			title.onclick = () => {
				if (!node.path || item.classList.contains('active')) return;
				setActive(item);
				openFile(node.path);
			};

			row.appendChild(arrow);
			row.appendChild(title);
			item.appendChild(row);

			if (hasChildren) {
				const children = document.createElement("div");
				children.className = "children";
				node.children.forEach(c => children.appendChild(createNode(c)));
				item.appendChild(children);
				arrow.onclick = e => {
					e.stopPropagation();
					toggleNode(item, arrow);
				};
			}
			return item;
		}

		function goBack() {
			sendMessage({ type: "back" });
		}

		function goForward() {
			sendMessage({ type: "forward" });
		}

		function openFile(path) {
			sendMessage({ type: "setLastFile", path: path });
			hideError();
			sendMessage({ type: "open", path: path });
		}

		function sendMessage(obj) {
			if (window.chrome && chrome.webview) {
				chrome.webview.postMessage(obj);
			}
		}

		function showError(message) {
			errorBox.textContent = message;
			errorBox.style.display = "block";
		}

		function hideError() {
			errorBox.textContent = "";
			errorBox.style.display = "none";
		}

		function resizeSidebar(width, commit = false) {
			// C# clamps and persists this value too; clamping here keeps drag feedback stable.
			const nextWidth = clampSidebarWidth(width);
			sidebarWidth = nextWidth;
			sendMessage({ type: "resizeSidebar", width: nextWidth, commit });
		}

		function clampSidebarWidth(width) {
			return Math.max(minSidebarWidth, Math.min(maxSidebarWidth, Math.round(width)));
		}

		function getCssToHostScale() {
			// WebView zoom changes CSS pixel coordinates; the host splitter uses controller pixels.
			const cssWidth = window.innerWidth
				|| document.documentElement.clientWidth
				|| sidebar.getBoundingClientRect().width;
			if (!cssWidth) return 1;
			const scale = sidebarWidth / cssWidth;
			return Number.isFinite(scale) && scale > 0 ? scale : 1;
		}

		resizeHandle.addEventListener("pointerdown", e => {
			if (collapsed) return;
			resizing = true;
			resizeStartClientX = e.clientX;
			resizeStartWidth = sidebarWidth;
			resizeCssToHostScale = getCssToHostScale();
			document.body.classList.add("resizing");
			resizeHandle.setPointerCapture(e.pointerId);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointermove", e => {
			if (!resizing || collapsed) return;
			const delta = (e.clientX - resizeStartClientX) * resizeCssToHostScale;
			resizeSidebar(resizeStartWidth + delta);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointerup", e => {
			resizing = false;
			document.body.classList.remove("resizing");
			resizeSidebar(sidebarWidth, true);
			resizeHandle.releasePointerCapture(e.pointerId);
			e.preventDefault();
		});

		resizeHandle.addEventListener("pointercancel", () => {
			resizing = false;
			document.body.classList.remove("resizing");
			resizeSidebar(sidebarWidth, true);
		});

		function setActive(el) {
			document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
			el.classList.add("active");
			expandParents(el);
			el.scrollIntoView({ block: "nearest" });
		}

		function toggleNode(item, arrow) {
			item.classList.toggle("open");
			setArrowState(item, arrow);
		}

		function setArrowState(item, arrow) {
			if (arrow && item.querySelector(":scope > .children")) {
				arrow.textContent = item.classList.contains("open") ? ARROW_OPEN : ARROW_CLOSED;
			}
		}

		function setInitialActive(el) {
			document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
			el.classList.add("active");
			expandParents(el);
			requestAnimationFrame(() => {
				if (!collapsed) el.scrollIntoView({ block: "nearest" });
			});
		}

		function findNodeByPath(path) {
			const lower = path.toLowerCase();
			for (const node of document.querySelectorAll(".item")) {
				const p = node.dataset.path;
				if (p && p.toLowerCase() === lower) return node;
			}
			return null;
		}

		function findNodeBySwitchGroupPath(path) {
			const target = switchGroupPath(path);
			if (!target) return null;
			for (const node of document.querySelectorAll(".item")) {
				const p = node.dataset.path;
				if (p && switchGroupPath(p) === target) return node;
			}
			return null;
		}

		function switchGroupPath(path) {
			const normalized = String(path || "").replace(/\\/g, "/").toLowerCase();
			const slash = normalized.lastIndexOf("/");
			const dir = slash >= 0 ? normalized.slice(0, slash + 1) : "";
			const name = slash >= 0 ? normalized.slice(slash + 1) : normalized;
			const dot = name.lastIndexOf(".");
			const base = dot >= 0 ? name.slice(0, dot) : name;
			const ext = dot >= 0 ? name.slice(dot) : "";
			let group = base;
			while (/\s*\[[^\]]+\]\s*$/.test(group)) {
				group = group.replace(/\s*\[[^\]]+\]\s*$/, "");
			}
			return group === base ? "" : dir + group + ext;
		}

		const loadingOverlay = document.getElementById("loadingOverlay");

		function showLoading() {
			loadingOverlay.classList.add("show");
		}

		function hideLoading() {
			loadingOverlay.classList.remove("show");
		}

		document.getElementById("search").addEventListener("input", e => {
			// Search hides non-matching rows and expands matching ancestors so results are visible.
			const q = e.target.value.trim().toLowerCase();
			if (!q) {
				allElements.forEach(el => {
					el.style.display = "";
					el.classList.remove("open");
					const a = el.querySelector(":scope > .row .arrow");
					setArrowState(el, a);
				});
				const active = document.querySelector(".item.active");
				if (active) {
					expandParents(active);
					active.scrollIntoView({ block: "nearest" });
				}
				return;
			}

			allElements.forEach(el => el.style.display = "none");
			allElements.forEach(el => {
				if (el.dataset.name.includes(q)) {
					el.style.display = "";
					let p = el.parentElement;
					while (p) {
						if (p.classList && p.classList.contains("item")) {
							p.style.display = "";
							p.classList.add("open");
							const a = p.querySelector(":scope > .row .arrow");
							setArrowState(p, a);
						}
						p = p.parentElement;
					}
				}
			});
		});

		function setActiveByPath(path) {
			const node = findNodeByPath(path) || findNodeBySwitchGroupPath(path);
			if (node) setActive(node);
		}
		function openNode(item) {
			item.classList.add("open");
			const a = item.querySelector(":scope > .row .arrow");
			setArrowState(item, a);
		}

		function expandParents(node) {
			let p = node.parentElement;
			while (p) {
				const item = p.closest(".item");
				if (item) openNode(item);
				p = item ? item.parentElement : null;
			}
		}
	</script>
</body>

</html>
